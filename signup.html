<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up | AI-SaaS Elite</title>
    <!-- Bootstrap 5.3 CSS -->
    <link href="assets/vendor/bootstrap/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="assets/vendor/fontawesome/css/all.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="assets/css/style.css">
</head>

<body>
    <div class="position-absolute top-0 end-0 m-3 z-3"><button class="btn btn-outline-secondary rounded-circle theme-toggle" style="width: 40px; height: 40px; display: flex; align-items: center; justify-content: center;" aria-label="Toggle Theme"><i class="fas fa-moon"></i></button></div>

    <div class="auth-wrapper py-5 px-3">
        <!-- Floating Back Button -->
        <a href="index.html" class="btn btn-light position-absolute top-0 start-0 m-4 shadow-sm rounded-pill px-3">
            <i class="fas fa-arrow-left me-2"></i> Back to Home
        </a>

        <div class="auth-card card-premium bg-white">
            <div class="text-center mb-4">
                <a href="index.html" class="text-decoration-none">
                    <div class="d-flex align-items-center justify-content-center gap-2 mb-3">
                        <img src="assets/img/logo/logo.png" alt="AI-SaaS Elite" class="nav-logo-img" style="height: 56px;">
                    </div>
                </a>
                <h4 class="fw-bold text-dark">Create an account</h4>
                <p class="text-muted">Start your 14-day free trial. No credit card required.</p>
            </div>

            <form class="needs-validation" novalidate>
                <!-- Anti-CSRF Token Placeholder for Backend Implementation -->
                <input type="hidden" name="csrf_token" value="{{CSRF_TOKEN}}">
                <div class="mb-3">
                    <label class="form-label fw-bold small">Full Name</label>
                    <input type="text" class="form-control" name="full_name" placeholder="John Doe" required pattern="[a-zA-Z\s\-]{2,50}" title="Name should only contain letters, spaces, and hyphens (2-50 characters)" maxlength="50">
                    <div class="invalid-feedback">Please enter your name.</div>
                </div>

                <div class="mb-3">
                    <label class="form-label fw-bold small">Email address</label>
                    <input type="email" class="form-control" name="email" placeholder="name@company.com" required maxlength="100">
                    <div class="invalid-feedback">Please enter a valid email address.</div>
                </div>

                <div class="mb-4">
                    <label class="form-label fw-bold small">Password</label>
                    <input type="password" class="form-control" name="password" placeholder="Create a strong password" required minlength="8" maxlength="128" pattern="(?=.*\d)(?=.*[a-z])(?=.*[A-Z]).{8,}" title="Must contain at least one number and one uppercase and lowercase letter, and at least 8 or more characters">
                    <div class="invalid-feedback">Password must be at least 8 characters.</div>
                </div>

                <div class="mb-4 form-check">
                    <input type="checkbox" class="form-check-input" id="termsBox" required>
                    <label class="form-check-label small" for="termsBox">I agree to the <a href="terms.html"
                            class="text-secondary text-decoration-none">Terms</a> and <a href="privacy.html"
                            class="text-secondary text-decoration-none">Privacy Policy</a>.</label>
                    <div class="invalid-feedback">You must agree before submitting.</div>
                </div>

                <button type="submit" class="btn btn-primary w-100 py-2 mb-3">Create Account</button>

                <div class="position-relative mb-4 text-center">
                    <hr class="text-muted">
                    <span class="position-absolute top-50 start-50 translate-middle bg-white px-2 small text-muted">Or
                        continue with</span>
                </div>

                <div class="row g-2 mb-4">
                    <div class="col-6">
                        <button type="button"
                            class="btn btn-outline-secondary w-100 text-dark bg-white shadow-sm border-0"><i
                                class="fab fa-google text-danger me-2"></i> Google</button>
                    </div>
                    <div class="col-6">
                        <button type="button"
                            class="btn btn-outline-secondary w-100 text-dark bg-white shadow-sm border-0"><i
                                class="fab fa-microsoft text-info me-2"></i> Microsoft</button>
                    </div>
                </div>

                <p class="text-center small mb-0 text-muted">
                    Already have an account? <a href="login.html" class="fw-bold text-primary text-decoration-none">Log
                        in</a>
                </p>
            </form>
        </div>
    </div>

    <!-- Bootstrap & JS -->
    <script src="assets/vendor/bootstrap/js/bootstrap.bundle.min.js"></script>
    <script src="assets/js/main.js"></script>


</body>

</html>
